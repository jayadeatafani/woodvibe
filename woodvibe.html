<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WoodVibe Premium</title>

<link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#f5f5f5;
}

/* HEADER */
header {
    background:#3e2c23;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

.logo {
    font-size:24px;
    font-weight:bold;
}
.logo span { color:#c89b6d; }

/* HERO */
.hero {
    height:90vh;
    background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c') center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

.btn {
    background:#25D366;
    padding:12px 20px;
    border-radius:8px;
    color:white;
    text-decoration:none;
}

/* SECTION */
.section {
    padding:50px 20px;
    text-align:center;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card {
    background:white;
    border-radius:12px;
    overflow:hidden;
}

.card img {
    width:100%;
    height:200px;
    object-fit:cover;
}

/* BEFORE AFTER */
.compare {
    position:relative;
    width:100%;
    max-width:600px;
    margin:auto;
}
.compare img {
    width:100%;
}
.after {
    position:absolute;
    top:0;
    left:0;
    width:50%;
    overflow:hidden;
}

/* FORM */
form input, form textarea {
    width:100%;
    padding:10px;
    margin:10px 0;
}
</style>
</head>

<body>

<header>
    <div class="logo">W<span>B</span></div>
    <div>WoodVibe</div>
</header>

<!-- HERO -->
<section class="hero">
    <div data-aos="fade-up">
        <h1>Desain Dinding Kayu Premium</h1>
        <p>Bikin rumah kamu jadi estetik & elegan</p>
        <a class="btn" href="https://wa.me/6281337416410">Chat WhatsApp</a>
    </div>
</section>

<!-- KATALOG -->
<section class="section">
<h2 data-aos="fade-up">Katalog</h2>

<div class="grid">

<div class="card" data-aos="zoom-in">
<img src="https://images.unsplash.com/photo-1618220179428-22790b461013">
<h3>Minimalis</h3>
<p>Rp 500.000</p>
</div>

<div class="card" data-aos="zoom-in">
<img src="https://images.unsplash.com/photo-1600210492486-724fe5c67fb0">
<h3>Rustic</h3>
<p>Rp 750.000</p>
</div>

<div class="card" data-aos="zoom-in">
<img src="https://images.unsplash.com/photo-1586023492125-27b2c045efd7">
<h3>Luxury</h3>
<p>Rp 1.200.000</p>
</div>

</div>
</section>

<!-- BEFORE AFTER -->
<section class="section">
<h2 data-aos="fade-up">Before & After</h2>

<div class="compare">
<img src="https://images.unsplash.com/photo-1505691938895-1758d7feb511">
<div class="after">
<img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
</div>
</div>

</section>

<!-- BOOKING FORM -->
<section class="section">
<h2 data-aos="fade-up">Booking Konsultasi</h2>

<form onsubmit="kirimWA(); return false;">
<input type="text" id="nama" placeholder="Nama" required>
<input type="text" id="hp" placeholder="No HP" required>
<textarea id="pesan" placeholder="Kebutuhan desain"></textarea>
<button class="btn">Kirim</button>
</form>

</section>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
AOS.init();

function kirimWA(){
    let nama = document.getElementById("nama").value;
    let hp = document.getElementById("hp").value;
    let pesan = document.getElementById("pesan").value;

    let url = "https://wa.me/6281337416410?text=Halo WoodVibe%0ANama: "+nama+"%0ANo HP: "+hp+"%0A"+pesan;

    window.open(url, "_blank");
}
</script>

</body>
</html>
